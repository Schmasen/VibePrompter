<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Vibe Prompter</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-color: #ffcc00;
            --ui-bg: #1a1a1a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        /* --- SETUP SCREEN --- */
        #setup-screen {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: var(--accent-color);
        }

        textarea {
            flex-grow: 1;
            background-color: var(--ui-bg);
            color: var(--text-color);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            font-size: 18px;
            resize: none;
            margin-bottom: 20px;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent-color);
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background-color: var(--ui-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-group label {
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-color);
        }

        .checkbox-group {
            grid-column: span 2;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--accent-color);
        }

        #btn-play {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }

        #btn-play:active {
            opacity: 0.7;
        }

        /* --- PROMPTER SCREEN --- */
        #prompter-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            z-index: 100;
            display: none;
            touch-action: none;
        }

        #countdown-bar {
            position: absolute;
            top: 0;
            right: 0;
            height: 10px;
            background-color: var(--accent-color);
            width: 100%;
            z-index: 102;
        }

        #text-container {
            position: absolute;
            width: 100%;
            padding: 0 40px;
            left: 50%;
            transform: translateX(-50%);
            will-change: top;
        }

        #prompter-text {
            color: var(--text-color);
            line-height: 1.5;
            text-align: center;
            white-space: pre-wrap;
            padding-bottom: 50vh; /* Extra Platz am Ende */
        }

        .mirrored {
            transform: scaleX(-1);
        }

        /* Timeline Scrub Bar */
        #timeline-scrubber {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 40px; /* Großes Touch-Target */
            z-index: 104;
            accent-color: var(--accent-color);
            opacity: 0.4;
            transition: opacity 0.3s;
        }

        #timeline-scrubber:active,
        #timeline-scrubber:hover {
            opacity: 1;
        }

        #btn-exit {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            font-size: 20px;
            z-index: 103;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        #pause-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 204, 0, 0.8);
            font-size: 40px;
            font-weight: bold;
            z-index: 101;
            display: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>Vibe Prompter</h1>
        <textarea id="input-text" placeholder="Füge dein Skript hier ein..."></textarea>
        
        <div class="controls">
            <div class="control-group">
                <label>Textgröße <span id="val-size">80px</span></label>
                <input type="range" id="slider-size" min="30" max="150" value="80">
            </div>
            <div class="control-group">
                <label>Geschwindigkeit <span id="val-speed">5</span></label>
                <input type="range" id="slider-speed" min="1" max="20" value="5" step="0.5">
            </div>
            <div class="control-group">
                <label>Countdown (Sekunden) <span id="val-delay">3s</span></label>
                <input type="range" id="slider-delay" min="0" max="10" value="3" step="1">
            </div>
            <label class="checkbox-group">
                <input type="checkbox" id="check-mirror" checked>
                Text horizontal spiegeln
            </label>
        </div>

        <button id="btn-play">Start Prompter</button>
    </div>

    <div id="prompter-screen">
        <div id="countdown-bar"></div>
        <div id="pause-indicator">PAUSE</div>
        
        <div id="text-container">
            <div id="prompter-text"></div>
        </div>

        <input type="range" id="timeline-scrubber" min="0" max="1000" value="0">

        <button id="btn-exit">✕</button>
    </div>

    <script>
        // DOM Elemente
        const setupScreen = document.getElementById('setup-screen');
        const prompterScreen = document.getElementById('prompter-screen');
        const inputText = document.getElementById('input-text');
        const prompterText = document.getElementById('prompter-text');
        const textContainer = document.getElementById('text-container');
        const countdownBar = document.getElementById('countdown-bar');
        const pauseIndicator = document.getElementById('pause-indicator');
        const timelineScrubber = document.getElementById('timeline-scrubber');
        
        // Controls
        const sliderSize = document.getElementById('slider-size');
        const sliderSpeed = document.getElementById('slider-speed');
        const sliderDelay = document.getElementById('slider-delay');
        const checkMirror = document.getElementById('check-mirror');
        
        // Buttons
        const btnPlay = document.getElementById('btn-play');
        const btnExit = document.getElementById('btn-exit');

        // State Variables
        let isPlaying = false;
        let isPaused = false;
        let currentY = 0;
        let animationFrameId;
        let countdownTimeoutId;
        let isScrubbing = false;

        // UI Updates für Sliders
        sliderSize.addEventListener('input', (e) => document.getElementById('val-size').innerText = e.target.value + 'px');
        sliderSpeed.addEventListener('input', (e) => document.getElementById('val-speed').innerText = e.target.value);
        sliderDelay.addEventListener('input', (e) => document.getElementById('val-delay').innerText = e.target.value + 's');

        // Start Prompter
        btnPlay.addEventListener('click', () => {
            const text = inputText.value.trim();
            if (!text) {
                alert("Bitte erst einen Text eingeben!");
                return;
            }

            prompterText.innerText = text;
            prompterText.style.fontSize = sliderSize.value + 'px';
            
            if (checkMirror.checked) {
                prompterText.classList.add('mirrored');
            } else {
                prompterText.classList.remove('mirrored');
            }

            setupScreen.style.display = 'none';
            prompterScreen.style.display = 'block';

            startSequence(false); // false = Startet komplett von vorne
        });

        // Exit Prompter
        btnExit.addEventListener('click', (e) => {
            e.stopPropagation();
            stopPrompter();
        });

        // Pause / Resume durch Tippen
        prompterScreen.addEventListener('click', () => {
            if (!isPlaying && countdownTimeoutId === null) return; // Verhindert Bug während dem Scrubben
            
            isPaused = !isPaused;
            if (isPaused) {
                pauseIndicator.style.display = 'block';
            } else {
                pauseIndicator.style.display = 'none';
                lastTime = performance.now();
                scrollLoop(lastTime);
            }
        });

        // Verhindern, dass Touch/Click auf die Scrollbar den globalen Pause-Befehl auslöst
        ['click', 'mousedown', 'touchstart'].forEach(evt => {
            timelineScrubber.addEventListener(evt, (e) => e.stopPropagation());
        });

        // --- NEU: Scrubber Logik ---
        
        // Wenn der User an der Bar zieht
        timelineScrubber.addEventListener('input', (e) => {
            isScrubbing = true;
            isPlaying = false;
            isPaused = false;
            pauseIndicator.style.display = 'none';
            
            // Laufende Animationen/Countdowns abbrechen
            cancelAnimationFrame(animationFrameId);
            clearTimeout(countdownTimeoutId);
            countdownBar.style.width = '0%';
            countdownBar.style.transition = 'none';

            // Position berechnen
            const totalScrollDistance = window.innerHeight + textContainer.offsetHeight;
            const progress = e.target.value / 1000;
            currentY = window.innerHeight - (totalScrollDistance * progress);
            
            // Text direkt verschieben
            textContainer.style.top = currentY + 'px';
        });

        // Wenn der User die Bar loslässt
        timelineScrubber.addEventListener('change', () => {
            isScrubbing = false;
            startSequence(true); // true = Weiter machen (nicht von vorne anfangen)
        });


        // --- Angepasste Start-Sequenz ---
        // Parameter "resume": Wenn true, bleibt der Text wo er ist. Wenn false, springt er an den Start.
        function startSequence(resume = false) {
            isPaused = false;
            isPlaying = false;
            pauseIndicator.style.display = 'none';

            if (!resume) {
                currentY = window.innerHeight;
                textContainer.style.top = currentY + 'px';
                timelineScrubber.value = 0;
            }

            const delaySeconds = parseFloat(sliderDelay.value);

            if (delaySeconds > 0) {
                countdownBar.style.transition = 'none';
                countdownBar.style.width = '100%';
                
                void countdownBar.offsetWidth; // Force Reflow

                countdownBar.style.transition = `width ${delaySeconds}s linear`;
                countdownBar.style.width = '0%';

                countdownTimeoutId = setTimeout(() => {
                    countdownTimeoutId = null;
                    startScrolling();
                }, delaySeconds * 1000);
            } else {
                countdownBar.style.width = '0%';
                countdownTimeoutId = null;
                startScrolling();
            }
        }

        let lastTime = 0;
        function startScrolling() {
            isPlaying = true;
            lastTime = performance.now();
            animationFrameId = requestAnimationFrame(scrollLoop);
        }

        function scrollLoop(time) {
            if (!isPlaying || isPaused || isScrubbing) return;

            const deltaTime = time - lastTime;
            lastTime = time;

            const speedMultiplier = parseFloat(sliderSpeed.value) * 0.05; 
            currentY -= speedMultiplier * deltaTime;
            textContainer.style.top = currentY + 'px';

            // Scrubber UI updaten
            const totalScrollDistance = window.innerHeight + textContainer.offsetHeight;
            const distanceTraveled = window.innerHeight - currentY;
            const progress = (distanceTraveled / totalScrollDistance) * 1000;
            timelineScrubber.value = Math.max(0, Math.min(1000, progress));

            // Ende prüfen
            const textHeight = textContainer.offsetHeight;
            if (currentY < -textHeight) {
                stopPrompter();
                return;
            }

            animationFrameId = requestAnimationFrame(scrollLoop);
        }

        function stopPrompter() {
            isPlaying = false;
            isScrubbing = false;
            cancelAnimationFrame(animationFrameId);
            clearTimeout(countdownTimeoutId);
            countdownTimeoutId = null;
            
            prompterScreen.style.display = 'none';
            setupScreen.style.display = 'flex';
        }
    </script>
</body>
</html>
